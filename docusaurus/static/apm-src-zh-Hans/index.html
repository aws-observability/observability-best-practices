        <h2>欢迎</h2>
        <p>本文档站点涵盖了 CloudWatch 应用性能监控 (APM) 的相关内容，面向需要了解生产环境中应用行为的开发人员、运维人员和架构师。</p>
        <p>APM 通过将服务健康状况（延迟、错误、可用性和吞吐量）与架构中的 traces 和相关信号关联起来，帮助您缩短检测时间和解决时间。</p>
