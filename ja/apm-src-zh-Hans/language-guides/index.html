<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>语言特定指南 — CloudWatch APM</title>
    <link rel="stylesheet" href="../assets/css/style.css">
  </head>
  <body>
    <header class="site-header">
      <a href="../index.html" class="logo">CloudWatch APM 文档</a>
    </header>
    <div class="site">
      <aside class="left-nav" id="left-nav"></aside>
      <main class="content">
        <header><h1>语言特定指南</h1></header>
        <article>
          <section>
            <p>选择您要为 CloudWatch Application Signals 启用的平台和运行时。每个指南基于 <code>apm-center</code> 中维护的启用内容，并在相同的文档 UI 中呈现。</p>
          </section>
          <section>
            <h2>启用指南（16 种组合）</h2>
            <div id="guide-grid">正在加载指南…</div>
          </section>
        </article>
      </main>
    </div>

    <script>
      (() => {
        const grid = document.getElementById('guide-grid');
        const isDocusaurus = location.pathname.includes('/apm/');
        const apmRoot = isDocusaurus ? location.pathname.split('/apm/')[0] + '/apm/' : '/';
        const viewerBase = isDocusaurus ? 'pages/language-guide/?combo=' : 'pages/language-guide.html?combo=';

        const combos = [
          { platform: 'Lambda', id: 'lambda-java', label: 'Java' },
          { platform: 'Lambda', id: 'lambda-python', label: 'Python' },
          { platform: 'Lambda', id: 'lambda-nodejs', label: 'Node.js' },
          { platform: 'Lambda', id: 'lambda-dotnet', label: '.NET' },
          { platform: 'ECS', id: 'ecs-java', label: 'Java' },
          { platform: 'ECS', id: 'ecs-python', label: 'Python' },
          { platform: 'ECS', id: 'ecs-nodejs', label: 'Node.js' },
          { platform: 'ECS', id: 'ecs-dotnet', label: '.NET' },
          { platform: 'EKS', id: 'eks-java', label: 'Java' },
          { platform: 'EKS', id: 'eks-python', label: 'Python' },
          { platform: 'EKS', id: 'eks-nodejs', label: 'Node.js' },
          { platform: 'EKS', id: 'eks-dotnet', label: '.NET' },
          { platform: 'EC2', id: 'ec2-java', label: 'Java' },
          { platform: 'EC2', id: 'ec2-python', label: 'Python' },
          { platform: 'EC2', id: 'ec2-nodejs', label: 'Node.js' },
          { platform: 'EC2', id: 'ec2-dotnet', label: '.NET' },
        ];

        const byPlatform = combos.reduce((acc, c) => {
          (acc[c.platform] ||= []).push(c);
          return acc;
        }, {});

        let html = '<div class="guide-grid">';
        Object.keys(byPlatform).forEach((platform) => {
          html += `<div class="guide-card"><h3>${platform}</h3><ul>`;
          byPlatform[platform].forEach((c) => {
            const href = apmRoot + viewerBase + encodeURIComponent(c.id);
            html += `<li><a href="${href}">${c.label}</a></li>`;
          });
          html += '</ul></div>';
        });
        html += '</div>';
        grid.innerHTML = html;
      })();
    </script>

    <script src="../assets/js/site.js"></script>
  </body>
</html>
