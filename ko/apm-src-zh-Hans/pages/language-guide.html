<!doctype html>
<html lang="zh-Hans">
  <head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>语言指南 — CloudWatch APM</title>
  <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <a href="../index.html" class="logo">CloudWatch APM 文档</a>
  </header>
  <div class="site">
    <aside class="left-nav" id="left-nav"></aside>
    <main class="content">
      <header>
        <h1 id="guide-title">语言指南</h1>
      </header>
      <article>
        <div id="guide-meta"></div>
        <div id="guide-content">加载中…</div>
      </article>
    </main>
  </div>

  <script>
    (async () => {
      const params = new URLSearchParams(location.search);
      const combo = params.get('combo');
      const titleEl = document.getElementById('guide-title');
      const metaEl = document.getElementById('guide-meta');
      const contentEl = document.getElementById('guide-content');
      const inCleanUrl = /\/language-guide\/?$/.test(location.pathname);
      const listHref = inCleanUrl ? '../language-guides/' : 'language-guides.html';

      if (!combo) {
        titleEl.textContent = '语言指南';
        contentEl.innerHTML = `<p>缺少 <code>?combo=</code>。返回<a href="${listHref}">语言特定指南</a>。</p>`;
        return;
      }

      const srcHtml = `../language-guides/enablement/${encodeURIComponent(combo)}.html`;
      const srcClean = `../language-guides/enablement/${encodeURIComponent(combo)}/`;

      titleEl.textContent = combo.replace(/-/g, ' ').toUpperCase();
      metaEl.innerHTML = `
        <div class="guide-meta">
          <a href="${listHref}">← 所有语言指南</a>
          <span class="guide-src">来源: <code>${srcHtml}</code></span>
        </div>
      `;

      try {
        const tryFetch = async (url) => {
          const r = await fetch(url, { cache: 'no-cache', redirect: 'follow' });
          return r.ok ? r : null;
        };

        const res = (await tryFetch(srcHtml)) || (await tryFetch(srcClean));
        const usedSrc = res?.url || srcHtml;
        if (!res) throw new Error(`Failed to load ${srcHtml} (and ${srcClean})`);

        const html = await res.text();
        const doc = new DOMParser().parseFromString(html, 'text/html');

        // Prefer the main container from the source docs.
        const container = doc.querySelector('.container') || doc.body;

        // Drop the source page header/back-link if present.
        container.querySelectorAll('style, script, link[rel="stylesheet"]').forEach((n) => n.remove());
        container.querySelectorAll('.header, .back-link').forEach((n) => n.remove());

        // Normalize common blocks into the docs site styling.
        container.querySelectorAll('.section').forEach((n) => {
          const section = doc.createElement('section');
          section.innerHTML = n.innerHTML;
          n.replaceWith(section);
        });

        // Convert custom code blocks to <pre><code> for site CSS.
        container.querySelectorAll('.code-block').forEach((n) => {
          const pre = doc.createElement('pre');
          const code = doc.createElement('code');
          code.textContent = n.textContent || '';
          pre.appendChild(code);
          n.replaceWith(pre);
        });

        // Convert callouts to the existing "box" style.
        const calloutMap = [
          ['highlight', 'box guide-callout guide-callout-highlight'],
          ['warning', 'box guide-callout guide-callout-warning'],
          ['success', 'box guide-callout guide-callout-success'],
        ];
        calloutMap.forEach(([cls, newCls]) => {
          container.querySelectorAll('.' + cls).forEach((n) => {
            n.className = newCls;
          });
        });

        // Use title from source HTML if available.
        const srcTitle = doc.querySelector('title')?.textContent?.trim();
        if (srcTitle) titleEl.textContent = srcTitle;

        const srcCode = metaEl.querySelector('.guide-src code');
        if (srcCode) srcCode.textContent = usedSrc;

        contentEl.innerHTML = container.innerHTML;
      } catch (err) {
        contentEl.innerHTML = `
          <div class="box guide-callout guide-callout-warning">
            <h2>无法加载指南内容</h2>
            <p>${String(err.message || err)}</p>
          </div>
        `;
      }
    })();
  </script>

  <script src="../assets/js/site.js"></script>
</body>
</html>
