<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 620" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="13">
  <defs>
    <linearGradient id="eksGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e2eafc"/>
    </linearGradient>
    <linearGradient id="otelDemoGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="collectorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="cwMetricsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="xrayGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="cwLogsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdfa"/>
      <stop offset="100%" stop-color="#ccfbf1"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fefce8"/>
      <stop offset="100%" stop-color="#fef9c3"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="820" height="620" rx="12" fill="#fafbfc"/>

  <!-- EKS Cluster outer box -->
  <rect x="60" y="20" width="700" height="260" rx="10" fill="#fff7ed" stroke="#e8850a" stroke-width="1.5" filter="url(#shadow)"/>
  <!-- EKS icon (top-right corner) -->
  <g transform="translate(730, 26)">
    <rect width="22" height="22" rx="4" fill="#e8850a"/>
    <g transform="translate(11, 11) scale(0.32)" fill="none" stroke="#fff" stroke-width="3" stroke-linejoin="round">
      <polygon points="0,-22 19,-11 19,11 0,22 -19,11 -19,-11"/>
      <line x1="-6" y1="-10" x2="-6" y2="10"/>
      <line x1="-6" y1="0" x2="6" y2="-10"/>
      <line x1="-6" y1="0" x2="6" y2="10"/>
      <path d="M4,16 Q-4,16 -4,12 Q-8,12 -8,8 Q-8,4 -3,4 Q-1,0 5,2 Q10,2 10,6 Q14,6 14,10 Q14,14 10,14 Z" transform="translate(6,4) scale(0.6)"/>
    </g>
  </g>
  <text x="80" y="46" font-weight="700" font-size="15" fill="#9a3412">EKS Cluster (Auto Mode)</text>

  <!-- OTel Demo box -->
  <rect x="90" y="60" width="640" height="100" rx="8" fill="url(#otelDemoGrad)" stroke="#f59e0b" stroke-width="1.2"/>
  <a href="https://opentelemetry.io/docs/demo/" target="_blank">
    <text x="110" y="84" font-weight="600" font-size="14" fill="#92400e" text-decoration="underline">OTel Demo (15 microservices)</text>
  </a>

  <!-- Microservice names row 1 (8 services) -->
  <text x="110" y="106" font-size="11" fill="#78350f">
    <tspan font-weight="500">accounting</tspan>, <tspan font-weight="500">ad</tspan>, <tspan font-weight="500">cart</tspan>, <tspan font-weight="500">checkout</tspan>, <tspan font-weight="500">currency</tspan>, <tspan font-weight="500">email</tspan>, <tspan font-weight="500">fraud-detection</tspan>, <tspan font-weight="500">frontend</tspan>,
  </text>
  <!-- Microservice names row 2 (7 services) -->
  <text x="110" y="122" font-size="11" fill="#78350f">
    <tspan font-weight="500">load-generator</tspan>, <tspan font-weight="500">payment</tspan>, <tspan font-weight="500">product-catalog</tspan>, <tspan font-weight="500">product-reviews</tspan>, <tspan font-weight="500">quote</tspan>, <tspan font-weight="500">recommendation</tspan>, <tspan font-weight="500">shipping</tspan>
  </text>

  <!-- Arrow from OTel Demo to Collector -->
  <line x1="410" y1="160" x2="410" y2="188" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="404,184 410,194 416,184" fill="#64748b"/>
  <text x="420" y="182" font-size="11" fill="#64748b" font-style="italic">OTLP (gRPC / HTTP)</text>

  <!-- OTel Collector box -->
  <rect x="90" y="196" width="640" height="50" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2"/>
  <text x="110" y="226" font-weight="600" font-size="14" fill="#334155">OTel Collector</text>
  <text x="268" y="226" font-size="12" fill="#94a3b8">(SigV4 auth)</text>

  <!-- Three arrows down from Collector -->
  <!-- Single arrow down from Collector -->
  <line x1="410" y1="246" x2="410" y2="322" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="404,318 410,328 416,318" fill="#64748b"/>

  <!-- Amazon CloudWatch combined box -->
  <a href="https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch-OTLPEndpoint.html" target="_blank">
    <rect x="130" y="330" width="560" height="60" rx="8" fill="#fdf2f8" stroke="#e7157b" stroke-width="1.2" filter="url(#shadow)"/>
    <!-- CloudWatch icon (top-right corner) -->
    <g transform="translate(662, 336)">
      <rect width="22" height="22" rx="4" fill="#e7157b"/>
      <g transform="translate(11, 10) scale(0.28)" fill="none" stroke="#fff" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round">
        <path d="M-20,6 Q-20,-6 -10,-6 Q-6,-16 6,-12 Q16,-14 18,-4 Q26,-4 26,6 Q26,14 18,14 L-14,14 Q-20,14 -20,6 Z"/>
        <circle cx="10" cy="10" r="8"/>
        <line x1="16" y1="16" x2="22" y2="22"/>
      </g>
    </g>
    <text x="410" y="354" text-anchor="middle" font-weight="700" font-size="14" fill="#be185d">Amazon CloudWatch</text>
    <text x="410" y="374" text-anchor="middle" font-size="12" fill="#e7157b" text-decoration="underline">Metrics  ·  Traces  ·  Logs</text>
  </a>

  <!-- Single arrow from CloudWatch to the app -->
  <line x1="410" y1="390" x2="410" y2="442" stroke="#64748b" stroke-width="1.5"/>
  <polygon points="404,438 410,448 416,438" fill="#64748b"/>

  <!-- The Game app box (dark theme matching app UI) -->
  <rect x="90" y="450" width="640" height="150" rx="10" fill="#1a1f2e" stroke="#2d3548" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="110" y="478" font-weight="700" font-size="15" fill="#e2e8f0" font-variant="small-caps" letter-spacing="1">OpenTelemetry Demo: The Game</text>
  <text x="468" y="478" font-size="11" fill="#64748b">Learn observability by breaking things</text>

  <!-- Feature list — aligned columns -->
  <text x="130" y="504" font-weight="600" font-size="12.5" fill="#4ade80">r</text>
  <text x="145" y="504" font-size="12.5" fill="#64748b">…</text>
  <text x="160" y="504" font-size="12.5" fill="#cbd5e1">RED metrics dashboard</text>

  <text x="130" y="524" font-weight="600" font-size="12.5" fill="#4ade80">m</text>
  <text x="145" y="524" font-size="12.5" fill="#64748b">…</text>
  <text x="160" y="524" font-size="12.5" fill="#cbd5e1">Service map (traces &amp; logs)</text>

  <text x="131" y="544" font-weight="600" font-size="12.5" fill="#4ade80">c</text>
  <text x="145" y="544" font-size="12.5" fill="#64748b">…</text>
  <text x="160" y="544" font-size="12.5" fill="#cbd5e1">View costs</text>

  <text x="130" y="564" font-weight="600" font-size="12.5" fill="#4ade80">p</text>
  <text x="145" y="564" font-size="12.5" fill="#64748b">…</text>
  <a href="https://docs.aws.amazon.com/AmazonCloudWatch/latest/monitoring/CloudWatch-PromQL-Querying.html" target="_blank">
    <text x="160" y="564" font-size="12.5" fill="#93c5fd" text-decoration="underline">PromQL explorer</text>
  </a>
  <rect x="560" y="540" width="120" height="44" rx="10" fill="#2e8b3e" stroke="#256d32" stroke-width="1.5"/>
  <text x="620" y="568" text-anchor="middle" font-weight="600" font-size="18" fill="#ffffff">Play!</text>



</svg>