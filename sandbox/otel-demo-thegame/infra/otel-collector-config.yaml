# OpenTelemetry Collector configuration for CloudWatch OTLP ingestion
# This configures the OTel Collector deployed alongside the demo to export
# metrics, traces, and logs to CloudWatch via OTLP endpoints.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: otel-demo
data:
  relay.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      sigv4auth/metrics:
        region: "eu-west-1"
        service: "monitoring"
      sigv4auth/traces:
        region: "eu-west-1"
        service: "xray"
      sigv4auth/logs:
        region: "eu-west-1"
        service: "logs"

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 10s
        send_batch_size: 500
      resource:
        attributes:
          - key: cloud.provider
            value: aws
            action: upsert
      transform/metrics:
        error_mode: ignore
        metric_statements:
          - context: datapoint
            statements:
              - delete_key(attributes, "net.sock.peer.addr")
              - delete_key(attributes, "net.sock.peer.port")
              - delete_key(attributes, "http.status_code") where IsMatch(attributes["http.status_code"], "^[0-9]+$") == false

    exporters:
      # CloudWatch OTLP endpoint for metrics
      otlphttp/cw_metrics:
        endpoint: "https://monitoring.eu-west-1.amazonaws.com"
        auth:
          authenticator: sigv4auth/metrics

      # CloudWatch OTLP endpoint for traces (X-Ray)
      otlphttp/cw_traces:
        endpoint: "https://xray.eu-west-1.amazonaws.com"
        auth:
          authenticator: sigv4auth/traces

      # CloudWatch Logs via OTLP endpoint
      otlphttp/cw_logs:
        endpoint: "https://logs.eu-west-1.amazonaws.com"
        auth:
          authenticator: sigv4auth/logs
        headers:
          x-aws-log-group: "/otel/demo"
          x-aws-log-stream: "otel-demo-services"

    connectors:
      spanmetrics: {}

    service:
      extensions: [health_check, sigv4auth/metrics, sigv4auth/traces, sigv4auth/logs]
      pipelines:
        metrics:
          receivers: [otlp, spanmetrics]
          processors: [transform/metrics, batch]
          exporters: [otlphttp/cw_metrics]
        traces:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlphttp/cw_traces, spanmetrics]
        logs:
          receivers: [otlp]
          processors: [batch, resource]
          exporters: [otlphttp/cw_logs]
