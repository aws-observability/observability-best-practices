# =============================================================================
# Multi-cluster, same account, same VPC — SPOKE cluster agent.
# Same as agent.yaml, but the agent forwards to the shared gateway across the
# VPC via the internal NLB (see gateway-nlb-service.yaml) instead of an
# in-cluster Service. Deploy this on each cluster that does NOT run a gateway.
#
# Set <GATEWAY_NLB_DNS> to the NLB hostname from the hub cluster:
#   kubectl get svc otel-gateway -n otel-gateway \
#     -o jsonpath='{.status.loadBalancer.ingress[0].hostname}'
#
# TLS: this hop leaves the pod network, so it is configured for TLS
# (insecure: false). The gateway's OTLP receiver must present a server cert and
# the agent must trust it (ca_file); add cert_file/key_file for mTLS so the
# gateway can authenticate senders. Provisioning those certs (e.g. cert-manager)
# is a prerequisite and is out of scope for this Part 1 sample.
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: otel-agent
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-agent
  namespace: otel-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-agent-k8sattributes
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-agent-k8sattributes
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-agent-k8sattributes
subjects:
  - kind: ServiceAccount
    name: otel-agent
    namespace: otel-agent
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-agent-config
  namespace: otel-agent
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 400
        spike_limit_mib: 100
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.pod.name
            - k8s.node.name
            - k8s.deployment.name
        pod_association:
          - sources:
              - from: connection
      batch:
        timeout: 10s

    exporters:
      # Forward across the VPC to the shared gateway via the internal NLB.
      otlp/gateway:
        endpoint: <GATEWAY_NLB_DNS>:4317
        tls:
          insecure: false          # TLS across clusters
          ca_file: /etc/otel/certs/ca.crt
          # mTLS (authenticate this agent to the gateway):
          # cert_file: /etc/otel/certs/tls.crt
          # key_file:  /etc/otel/certs/tls.key
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
        sending_queue:
          enabled: true
          queue_size: 1000

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      telemetry:
        metrics:
          level: normal
          address: 0.0.0.0:8888
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp/gateway]
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-agent
  namespace: otel-agent
spec:
  selector:
    matchLabels:
      app: otel-agent
  template:
    metadata:
      labels:
        app: otel-agent
    spec:
      serviceAccountName: otel-agent
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.104.0
          args: ["--config=/etc/otel/config.yaml"]
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 8888
              name: metrics
            - containerPort: 13133
              name: health
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
          readinessProbe:
            httpGet:
              path: /
              port: 13133
          volumeMounts:
            - name: config
              mountPath: /etc/otel
            # Mount the CA (and client cert/key for mTLS) the exporter references:
            # - name: gateway-certs
            #   mountPath: /etc/otel/certs
            #   readOnly: true
      volumes:
        - name: config
          configMap:
            name: otel-agent-config
        # - name: gateway-certs
        #   secret:
        #     secretName: otel-gateway-client-certs
